name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

# ──────────────────────────────────────────────────
# SETUP INSTRUCTIONS (placeholder — complete these):
#
# 1. Install Vercel CLI locally:
#      pnpm add -g vercel
#
# 2. Link project to Vercel:
#      vercel link
#
# 3. Get your IDs from .vercel/project.json:
#      cat .vercel/project.json
#    → orgId and projectId
#
# 4. Create a Vercel token:
#      https://vercel.com/account/tokens
#
# 5. Add these GitHub repo secrets (Settings → Secrets → Actions):
#      VERCEL_TOKEN       — your Vercel token
#      VERCEL_ORG_ID      — orgId from step 3
#      VERCEL_PROJECT_ID  — projectId from step 3
# ──────────────────────────────────────────────────
